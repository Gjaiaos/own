<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
    font-family:sans-serif;
}

.app{
    width:100vw;
    height:100vh;
    max-width:420px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(270deg,#ff9ecb,#ffc1cc,#ff6fa5,#ffd6e0);
    background-size:600% 600%;
    animation:bgMove 15s ease infinite;
    transition:0.5s;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.main{
    position:absolute;
    top:50%;
    width:100%;
    transform:translateY(-50%);
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    z-index:2;
}

.avatar-box{
    position:relative;
    width:95px;
    height:95px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.avatar-box::before{
    content:"💖";
    position:absolute;
    font-size:110px;
    opacity:0.25;
    filter:blur(8px);
}

.avatar{
    width:85px;
    height:85px;
    border-radius:50%;
    background-size:cover;
    z-index:2;
    box-shadow:0 0 15px #ff4d88;
}

.name{
    color:#fff;
    text-align:center;
    font-size:13px;
    margin-top:10px;
    letter-spacing:1px;
}

.birthday{
    color:#fff;
    text-align:center;
    font-size:12px;
    margin-top:6px;
    opacity:0.8;
}

.center{text-align:center;color:#fff}

.caption{
    position:absolute;
    bottom:100px;
    width:100%;
    text-align:center;
    font-size:16px;
    color:#fff;
    font-weight:bold;
    animation:fade 4s infinite;
}

@keyframes fade{
    0%,100%{opacity:0}
    50%{opacity:1}
}

.btn{
    position:absolute;
    top:15px;
    right:15px;
    background:#ff4d88;
    border:none;
    color:#fff;
    padding:8px 12px;
    border-radius:20px;
    cursor:pointer;
    z-index:3;
}

/* 💗 TIM BAY TIKTOK */
.heart{
    position:absolute;
    bottom:-20px;
    font-size:20px;
    opacity:0.5;
    animation:floatUp linear forwards;
    filter:blur(1px);
}

/* ❤️ CHỮ RƠI 1 DÒNG, cùng size */
.love-text{
    position:absolute;
    top:50px; /* cố định dòng */
    font-size:20px; /* cùng size */
    font-weight:bold;
    opacity:0.9;
    animation:fall linear forwards;
    pointer-events:none;
    color:#fff;
}

@keyframes floatUp{
    0%{transform:translateY(0) scale(0.5);opacity:0}
    30%{opacity:1}
    100%{transform:translateY(-110vh) scale(1.3);opacity:0}
}

@keyframes fall{
    0%{transform:translateY(-50px);opacity:0}
    20%{opacity:1}
    100%{transform:translateY(110vh);opacity:0}
}
</style>
</head>

<body>

<div class="app" id="app">

<button class="btn" onclick="toggleMusic()">🎵</button>

<div class="main">

<div>
<div class="avatar-box">
<div class="avatar" style="background-image:url('https://files.catbox.moe/959x81.jpg')"></div>
</div>
<div class="name">Trần Thanh Giàu 💙</div>
<div class="birthday">08 / 02 / 2009</div>
</div>

<div class="center">
<div style="font-size:40px">💖</div>
<div>16-02-2026</div>
<div id="time"></div>
</div>

<div>
<div class="avatar-box">
<div class="avatar" style="background-image:url('https://files.catbox.moe/gd4kzo.jpg')"></div>
</div>
<div class="name">Hoàng Hải Yến 💗</div>
<div class="birthday">02 / 11 / 2009</div>
</div>

</div>

<div class="caption" id="cap">Yêu nhau mỗi ngày 💕</div>

</div>

<audio id="audio" loop>
<source src="https://files.catbox.moe/gimuva.mp3">
</audio>

<script>
// ⏱️ TIME
const start=new Date("2026-02-16");
setInterval(()=>{
let now=new Date();
let diff=now-start;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff%86400000/3600000);
let m=Math.floor(diff%3600000/60000);
let s=Math.floor(diff%60000/1000);

time.innerHTML=`${d} ngày ${h} giờ ${m} phút ${s} giây 💕`;
},1000);

// 🎵 NHẠC
let audio=document.getElementById("audio");
let isPlaying=false;

function fadeIn(){
    let v=0;
    audio.volume=0;
    audio.play().catch(()=>{});
    let f=setInterval(()=>{
        if(v<0.7){v+=0.05;audio.volume=v;}
        else clearInterval(f);
    },200);
}

function toggleMusic(){
    if(isPlaying){
        audio.pause();
        isPlaying=false;
    }else{
        fadeIn();
        isPlaying=true;
    }
}

// auto play + fallback
window.onload=()=>fadeIn();
document.body.addEventListener("click",()=>{if(!isPlaying){fadeIn();isPlaying=true;}},{once:true});

// 🌙 DARK MODE
function setTheme(){
    let hour=new Date().getHours();
    if(hour>=18 || hour<=5){
        document.body.style.background="#111";
    }else{
        document.body.style.background="#000";
    }
}
setTheme();
setInterval(setTheme,60000);

// 💗 TIM BAY TIKTOK
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💗";

    h.style.left=Math.random()*100+"%";
    h.style.fontSize=(15+Math.random()*20)+"px";
    h.style.animationDuration=(3+Math.random()*3)+"s";

    app.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);

// 💌 CHỮ RƠI NGẪU NHIÊN 1 DÒNG
const loveMessages=["Anh yêu em 💖","Em yêu anh 💗"];
const usedX=[]; // lưu X đã dùng để không trùng
setInterval(()=>{
    let t=document.createElement("div");
    t.className="love-text";
    t.innerHTML=loveMessages[Math.floor(Math.random()*loveMessages.length)];

    // chọn X ngẫu nhiên, không trùng
    let x;
    do{x=Math.floor(Math.random()*85);} 
    while(usedX.includes(x));
    usedX.push(x);
    if(usedX.length>5) usedX.shift(); // tối đa 5 chữ cùng lúc

    t.style.left=x+"%";

    t.style.animationDuration="5s"; // cùng tốc độ
    app.appendChild(t);
    setTimeout(()=>t.remove(),5000);
},600);

// CAPTION
const caps=[
"Yêu nhau mỗi ngày 💕",
"Mãi bên nhau nha 🥺",
"Anh yêu em 💖",
"Em yêu anh 💗",
"Cùng nhau đến cuối ❤️"
];

setInterval(()=>{
cap.innerHTML=caps[Math.floor(Math.random()*caps.length)];
},3000);

</script>

</body>
</html>
